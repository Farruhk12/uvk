<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Система Чек-МП</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Polyfill for older iOS support (Safari < 16.4) -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.8.2/dist/es-module-shims.js"></script>

    <!-- Global Error Handler -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var loader = document.getElementById('app-loader');
        if(loader) loader.style.display = 'none';
        
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; font-family:sans-serif; text-align:center; background-color:#FEF2F2; color:#333;">' +
            '<div style="background:white; padding:24px; border-radius:24px; box-shadow:0 10px 25px -5px rgba(0,0,0,0.1); width:100%; max-width:320px;">' +
            '<div style="color:#DC2626; font-size:48px; margin-bottom:16px;">⚠️</div>' +
            '<h2 style="font-size:20px; font-weight:700; margin-bottom:8px; color:#111;">Ошибка запуска</h2>' +
            '<p style="font-size:13px; color:#666; margin-bottom:20px; line-height:1.5;">' + msg + '</p>' +
            '<button onclick="location.reload()" style="background:#DF3B20; color:white; border:none; padding:14px; width:100%; border-radius:14px; font-weight:600; font-size:15px; cursor:pointer;">Перезагрузить</button>' +
            '</div></div>';
        }
      };
    </script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f1f5f9;
        -webkit-tap-highlight-color: transparent;
        margin: 0;
        padding: 0;
      }
      #app-loader {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #f1f5f9;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #DF3B20;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#DF3B20',
                dark: '#b92b14',
                light: '#ffedea'
              }
            }
          }
        }
      }
    </script>
    
    <!-- FIXED IMPORTMAP: Correctly handling bare specifiers and removing ALL React 19 entries -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0?target=es2019",
    "react-dom": "https://esm.sh/react-dom@18.2.0?target=es2019",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?target=es2019",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime?target=es2019",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1?target=es2019",
    "@/index": "./index.tsx",
    "@/": "./"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="app-loader">
      <div class="loader-spinner"></div>
      <p style="margin-top: 20px; color: #64748b; font-size: 14px; font-weight: 600;">Запуск системы...</p>
    </div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
